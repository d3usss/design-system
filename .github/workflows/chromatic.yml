name: "Chromatic"

on: "pull_request"

jobs:
  chromatic:
    name: Run Chromatic
    runs-on: ubuntu-24.04
    env:
      CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN || vars.CHROMATIC_PROJECT_TOKEN }}
    strategy:
      matrix:
        node-version: [26.2.0]
        pnpm-version: [11.11.0]
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: ${{ matrix.pnpm-version }}
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: pnpm ci
      - name: Skip Chromatic without token
        if: ${{ env.CHROMATIC_PROJECT_TOKEN == '' }}
        run: echo "Skipping Chromatic because no project token is configured."
      - name: Run Chromatic
        if: ${{ env.CHROMATIC_PROJECT_TOKEN != '' }}
        uses: chromaui/action@v1
        with:
          projectToken: ${{ env.CHROMATIC_PROJECT_TOKEN }}
          workingDir: storybook
          buildScriptName: build-storybook
