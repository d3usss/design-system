on: ["pull_request"]

name: Test Coveralls

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [26.2.0]
        pnpm-version: [11.11.0]
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: ${{ matrix.pnpm-version }}

      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies and run test coverage
        run: pnpm ci && pnpm run test-coverage

      - name: Coveralls
        id: coveralls
        continue-on-error: true
        uses: coverallsapp/github-action@v2.3.6

      - name: Coveralls upload warning
        if: ${{ steps.coveralls.outcome == 'failure' }}
        run: |
          echo "::warning::Coveralls upload failed (likely transient 5xx/network issue)."
          echo "::warning::Rerun workflow or retry later."
